version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ev-optimizer-postgres
    environment:
      POSTGRES_DB: evoptimizer
      POSTGRES_USER: evoptimizer
      POSTGRES_PASSWORD: evoptimizer_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evoptimizer"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ev-optimizer-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ev-optimizer-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://evoptimizer:evoptimizer_dev_password@postgres:5432/evoptimizer
      ENVIRONMENT: development
      DEBUG: "true"
      SECRET_KEY: dev-secret-key-change-in-production
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ev-optimizer-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # React Frontend (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: ev-optimizer-frontend
    command: npm run dev
    environment:
      VITE_API_URL: http://localhost:8000/api
      VITE_DEBUG: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    networks:
      - ev-optimizer-network
    stdin_open: true
    tty: true

  # Redis (Optional - for caching)
  redis:
    image: redis:7-alpine
    container_name: ev-optimizer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ev-optimizer-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin (Database Management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ev-optimizer-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - ev-optimizer-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ev-optimizer-network:
    driver: bridge

# Usage:
# docker-compose -f docker-compose.yml up -d
# docker-compose -f docker-compose.yml down
# docker-compose -f docker-compose.yml logs -f backend
